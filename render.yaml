# Render Blueprint for the Sabha Attendance app.
# Deploys the FastAPI backend (web service) + the React/Vite frontend (static site).
# Your database stays on your existing MongoDB Atlas cluster.
#
# Blueprint spec: https://render.com/docs/blueprint-spec
# Step-by-step instructions: see DEPLOY.md
#
# NOTE: CORS_ORIGINS and VITE_API_BASE reference each service's public URL, which
# only exists after the first deploy. They are marked `sync: false` — set them in
# the Render dashboard once, then redeploy. DEPLOY.md walks you through it.

services:
  # ------------------------------------------------------------------ #
  # Backend — FastAPI (async), served by Uvicorn                       #
  # ------------------------------------------------------------------ #
  - type: web
    name: sabha-attendance-api
    runtime: python
    plan: free
    branch: main          # deploy from this branch
    autoDeploy: true       # redeploy automatically on every push to `branch`
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DB_NAME
        value: sabha_app
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: FIRST_ADMIN_NAME
        value: Administrator
      - key: FIRST_ADMIN_EMAIL
        value: admin@sabha.app
      # Render generates a strong random secret automatically:
      - key: JWT_SECRET
        generateValue: true
      # --- Secrets you set in the dashboard (never committed) -------- #
      - key: MONGODB_URI            # your full Atlas connection string
        sync: false
      - key: FIRST_ADMIN_PASSWORD   # first admin login password
        sync: false
      # --- Set AFTER the frontend URL exists (see DEPLOY.md) --------- #
      - key: CORS_ORIGINS           # e.g. https://sabha-attendance-web.onrender.com
        sync: false

  # ------------------------------------------------------------------ #
  # Frontend — React + Vite, built to static files on a CDN            #
  # ------------------------------------------------------------------ #
  - type: web
    name: sabha-seva-web
    runtime: static
    branch: main          # deploy from this branch
    autoDeploy: true       # rebuild automatically on every push to `branch`
    rootDir: frontend
    # --include=dev forces devDependencies (Vite/Tailwind) even if Render
    # sets NODE_ENV=production during the build.
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: dist
    # SPA fallback so client-side routes (e.g. /dashboard) resolve to index.html:
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set AFTER the backend URL exists, then redeploy (see DEPLOY.md):
      - key: VITE_API_BASE          # e.g. https://sabha-attendance-api.onrender.com
        sync: false
